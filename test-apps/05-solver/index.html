<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solver Test App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #141414; color: #fff; font-family: system-ui, sans-serif; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #controls { padding: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    #controls button, #controls select, #controls label {
      font-size: 14px; color: #fff; background: #333; border: 1px solid #555;
      padding: 4px 10px; border-radius: 4px; cursor: pointer;
    }
    #controls input[type="range"] { width: 100px; }
    #controls input[type="number"] { width: 60px; background: #333; color: #fff; border: 1px solid #555; padding: 4px; border-radius: 4px; }
    #grid-container { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 20px; -webkit-user-select: none; user-select: none; }
    #counters { text-align: center; padding: 16px; font-size: 24px; font-weight: bold; }
    #counters .counter-label { opacity: 0.6; font-size: 14px; margin-right: 4px; }
    #counters .counter-group { display: inline-block; margin: 0 20px; }
    #settings-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; }
    #settings-overlay.open { display: flex; align-items: center; justify-content: center; }
    #settings-modal { background: #1e1e1e; border: 1px solid #555; border-radius: 8px; padding: 24px; max-width: 480px; width: 90%; max-height: 80vh; overflow-y: auto; color: #fff; }
    #settings-modal h2 { margin: 0 0 16px; font-size: 18px; }
    #settings-modal label { display: block; margin: 8px 0 4px; font-size: 13px; opacity: 0.8; }
    #settings-modal input[type="text"], #settings-modal input[type="number"], #settings-modal select { width: 100%; background: #333; color: #fff; border: 1px solid #555; padding: 6px 8px; border-radius: 4px; font-size: 14px; }
    #settings-modal input[type="range"] { width: 100%; }
    #settings-modal .checkbox-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: 13px; }
    #settings-modal .checkbox-row input { margin: 0; }
    #settings-modal .btn-row { display: flex; gap: 12px; margin-top: 20px; }
    #settings-modal button { flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #555; background: #333; color: #fff; cursor: pointer; font-size: 14px; }
    #settings-modal button.primary { background: #2563eb; border-color: #2563eb; }
    .weight-row { display: flex; gap: 8px; align-items: center; }
    .weight-row span { min-width: 30px; text-align: right; font-size: 12px; }
    #replay-controls { display: none; text-align: center; padding: 8px; }
    #replay-controls.active { display: block; }
    #replay-controls button { font-size: 16px; line-height: 20px; height: 34px; padding: 0 16px; margin: 0 4px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; box-sizing: border-box; vertical-align: middle; }
    #replay-controls .step-info { font-size: 14px; margin: 8px 0; opacity: 0.8; }
    #replay-controls .phase-info { font-size: 13px; opacity: 0.6; min-height: 1.5em; }
    #post-solve { display: none; text-align: center; padding: 8px; }
    #post-solve button { font-size: 14px; padding: 6px 16px; margin: 0 8px; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="app">
    <div id="controls"></div>
    <div id="grid-container">
      <svg id="grid-svg"></svg>
    </div>
    <div id="counters"></div>
    <div id="replay-controls"></div>
    <div id="post-solve"></div>
  </div>
  <div id="settings-overlay">
    <div id="settings-modal"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
